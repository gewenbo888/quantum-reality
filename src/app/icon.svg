<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3fc6f5" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#9a6bff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#9a6bff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="psi" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a6ecff"/>
      <stop offset="50%" stop-color="#6fdcff"/>
      <stop offset="100%" stop-color="#f7d98a"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#03040a"/>
  <circle cx="32" cy="32" r="26" fill="url(#glow)"/>
  <!-- orbital ellipses -->
  <g fill="none" stroke="#9a6bff" stroke-width="1.4" opacity="0.55">
    <ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(30 32 32)"/>
    <ellipse cx="32" cy="32" rx="22" ry="9" transform="rotate(-30 32 32)"/>
  </g>
  <!-- psi glyph: the wavefunction -->
  <text x="32" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="34" font-weight="500"
        text-anchor="middle" dominant-baseline="central" fill="url(#psi)">&#968;</text>
</svg>
